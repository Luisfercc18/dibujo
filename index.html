<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Espacio Alex & Lia</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { touch-action: none !important; -webkit-user-select: none; user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #050505; /* Fondo fuera del área */
            position: fixed; 
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { 
            display: block; 
            background: #0b0b0b; /* Fondo del área de dibujo */
            margin: auto; 
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #ui { 
            position: fixed; top: 25px; left: 25px; 
            color: rgba(255,255,255,0.25); font-size: 13px; font-weight: bold;
            letter-spacing: 1px; pointer-events: none; z-index: 10;
            display: flex; align-items: center; gap: 10px;
        }
        #status-dot { width: 8px; height: 8px; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="status-dot"></div>
        <span id="status-text">SYNCING...</span>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const API_KEY = '7B90kg.w4Ggew:jqrsjcLD2iXsUmHZDEXKLEmCiZ3_gu4auqYwJHBW6kk';
        let miNombre = localStorage.getItem('dibujo_nombre') || prompt("¿ALEX O LIA?");
        if(miNombre) localStorage.setItem('dibujo_nombre', miNombre);

        const ably = new Ably.Realtime({ key: API_KEY, clientId: miNombre });
        const channel = ably.channels.get('pizarra-secreta');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { desynchronized: true });

        // PROPORCIÓN FIJA (9:16 - Estilo celular para que a Lia le quede perfecto)
        const ASPECT_RATIO = 9 / 16; 

        function resize() {
            let w = window.innerWidth;
            let h = window.innerHeight;

            if (w / h > ASPECT_RATIO) {
                w = h * ASPECT_RATIO;
            } else {
                h = w / ASPECT_RATIO;
            }

            canvas.width = w;
            canvas.height = h;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = w * 0.008; // Grosor relativo al tamaño
        }
        window.addEventListener('resize', resize);
        resize();

        channel.subscribe('trazo', (msg) => {
            if (msg.clientId !== miNombre) {
                const color = (msg.clientId.toLowerCase() === 'alex') ? '#ff0066' : '#00ffcc';
                msg.data.forEach(t => {
                    draw(t.px * canvas.width, t.py * canvas.height, t.x * canvas.width, t.y * canvas.height, color);
                });
            }
        });

        function draw(x1, y1, x2, y2, color) {
            ctx.strokeStyle = color;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        let bufferTrazos = [];
        setInterval(() => {
            if (bufferTrazos.length > 0) {
                channel.publish('trazo', bufferTrazos);
                bufferTrazos = [];
            }
        }, 50);

        function mover(e) {
            if (!drawing) return;
            if (e.cancelable) e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            
            const x = t.clientX - rect.left;
            const y = t.clientY - rect.top;

            draw(lastX, lastY, x, y, miColor);
            bufferTrazos.push({ 
                px: lastX / canvas.width, py: lastY / canvas.height, 
                x: x / canvas.width, y: y / canvas.height 
            });
            [lastX, lastY] = [x, y];
        }

        function empezar(e) {
            drawing = true;
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            [lastX, lastY] = [t.clientX - rect.left, t.clientY - rect.top];
        }

        const miColor = (miNombre.toLowerCase() === 'alex') ? '#ff0066' : '#00ffcc';
        canvas.addEventListener('mousedown', empezar);
        canvas.addEventListener('touchstart', empezar, { passive: false });
        window.addEventListener('mousemove', mover);
        window.addEventListener('touchmove', mover, { passive: false });
        window.addEventListener('mouseup', () => drawing = false);
        window.addEventListener('touchend', () => drawing = false);

        ably.connection.on('connected', () => {
            document.getElementById('status-text').innerText = miNombre.toUpperCase();
            document.getElementById('status-dot').style.background = miColor;
        });
    </script>
</body>
</html>
