<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lienzo Privado 🎨</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; }
        body { margin: 0; background: #1a1a1a; overflow: hidden; position: fixed; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; background: transparent; }
        #ui { position: fixed; top: env(safe-area-inset-top, 10px); left: 10px; color: rgba(255,255,255,0.4); font-family: system-ui; pointer-events: none; font-size: 12px; }
    </style>
</head>
<body>
    <div id="ui">Cargando...</div>
    <canvas id="canvas"></canvas>

    <script>
        const API_KEY = '7B90kg.w4Ggew:jqrsjcLD2iXsUmHZDEXKLEmCiZ3_gu4auqYwJHBW6kk';
        
        let miNombre = localStorage.getItem('dibujo_nombre') || prompt("Tu nombre (Luis o Amiga):");
        if(miNombre) localStorage.setItem('dibujo_nombre', miNombre);

        const ably = new Ably.Realtime({ key: API_KEY, clientId: miNombre });
        const channel = ably.channels.get('pizarra-secreta');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Ajuste de resolución para que no se vea borroso
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);

        let drawing = false;
        let lastX = 0, lastY = 0;

        const miColor = (miNombre.toLowerCase() === 'luis') ? '#ff0066' : '#00ffcc';

        channel.subscribe('trazo', (msg) => {
            if (msg.clientId !== miNombre) {
                const suColor = (msg.clientId.toLowerCase() === 'luis') ? '#ff0066' : '#00ffcc';
                dibujar(msg.data.x, msg.data.y, msg.data.px, msg.data.py, suColor);
            }
        });

        function dibujar(x, y, px, py, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function getCoords(e) {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }

        function start(e) {
            drawing = true;
            const { x, y } = getCoords(e);
            [lastX, lastY] = [x, y];
        }

        function move(e) {
            if (!drawing) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            
            dibujar(x, y, lastX, lastY, miColor);
            channel.publish('trazo', { x, y, px: lastX, py: lastY });
            [lastX, lastY] = [x, y];
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('touchstart', start, { passive: false });
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, { passive: false });
        window.addEventListener('mouseup', () => drawing = false);
        window.addEventListener('touchend', () => drawing = false);

        ably.connection.on('connected', () => document.getElementById('ui').innerText = "⚡ " + miNombre);
    </script>
</body>
</html>
