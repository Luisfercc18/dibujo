<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Espacio Alex & Lia</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { touch-action: none !important; -webkit-user-select: none; user-select: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000000; 
            position: fixed; 
            font-family: 'Courier New', Courier, monospace;
        }

        canvas { 
            display: block; 
            background: #000000; 
            margin: auto; 
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            /* LÍNEA BLANCA MÁS VISIBLE (20% opacidad) */
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        #ui { 
            position: fixed; top: 25px; left: 25px; 
            color: #ffffff; 
            font-size: 14px; 
            font-weight: bold;
            letter-spacing: 2px; 
            pointer-events: none; z-index: 10;
            display: flex; align-items: center; gap: 12px;
        }

        #status-dot { width: 10px; height: 10px; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="status-dot" style="background: #333;"></div>
        <span id="status-text">SYNCING...</span>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const API_KEY = '7B90kg.w4Ggew:jqrsjcLD2iXsUmHZDEXKLEmCiZ3_gu4auqYwJHBW6kk';
        let miNombre = localStorage.getItem('dibujo_nombre') || prompt("¿ALEX O LIA?");
        if(miNombre) localStorage.setItem('dibujo_nombre', miNombre);

        const ably = new Ably.Realtime({ key: API_KEY, clientId: miNombre });
        const channel = ably.channels.get('pizarra-secreta');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { desynchronized: true });

        const ASPECT_RATIO = 9 / 16; 
        let drawing = false;
        let moved = false;
        let lastX = 0, lastY = 0;
        let bufferTrazos = [];

        function resize() {
            let w = window.innerWidth;
            let h = window.innerHeight;
            if (w / h > ASPECT_RATIO) { w = h * ASPECT_RATIO; } else { h = w / ASPECT_RATIO; }
            canvas.width = w;
            canvas.height = h;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = w * 0.01; 
        }
        window.addEventListener('resize', resize);
        resize();

        channel.subscribe('trazo', (msg) => {
            if (msg.clientId !== miNombre) {
                const color = (msg.clientId.toLowerCase() === 'alex') ? '#ff0066' : '#00ffcc';
                msg.data.forEach(t => {
                    if(t.isPoint) {
                        drawPoint(t.x * canvas.width, t.y * canvas.height, color);
                    } else {
                        drawLine(t.px * canvas.width, t.py * canvas.height, t.x * canvas.width, t.y * canvas.height, color);
                    }
                });
            }
        });

        function drawLine(x1, y1, x2, y2, color) {
            ctx.strokeStyle = color;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        function drawPoint(x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, ctx.lineWidth / 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        setInterval(() => {
            if (bufferTrazos.length > 0) {
                channel.publish('trazo', bufferTrazos);
                bufferTrazos = [];
            }
        }, 50);

        function mover(e) {
            if (!drawing) return;
            if (e.cancelable) e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            const x = t.clientX - rect.left;
            const y = t.clientY - rect.top;

            if (Math.abs(x - lastX) > 1 || Math.abs(y - lastY) > 1) {
                moved = true;
                drawLine(lastX, lastY, x, y, miColor);
                bufferTrazos.push({ px: lastX / canvas.width, py: lastY / canvas.height, x: x / canvas.width, y: y / canvas.height, isPoint: false });
                [lastX, lastY] = [x, y];
            }
        }

        function empezar(e) {
            drawing = true;
            moved = false;
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            [lastX, lastY] = [t.clientX - rect.left, t.clientY - rect.top];
        }

        function terminar(e) {
            if (!drawing) return;
            if (!moved) {
                drawPoint(lastX, lastY, miColor);
                bufferTrazos.push({ x: lastX / canvas.width, y: lastY / canvas.height, isPoint: true });
            }
            drawing = false;
        }

        const miColor = (miNombre.toLowerCase() === 'alex') ? '#ff0066' : '#00ffcc';
        canvas.addEventListener('mousedown', empezar);
        canvas.addEventListener('touchstart', empezar, { passive: false });
        window.addEventListener('mousemove', mover);
        window.addEventListener('touchmove', mover, { passive: false });
        window.addEventListener('mouseup', terminar);
        window.addEventListener('touchend', terminar);

        ably.connection.on('connected', () => {
            document.getElementById('status-text').innerText = miNombre.toUpperCase();
            document.getElementById('status-dot').style.background = miColor;
            document.getElementById('status-dot').style.boxShadow = `0 0 10px ${miColor}`;
        });
    </script>
</body>
</html>
