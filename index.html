<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Espacio Alex & Lia</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { touch-action: none !important; -webkit-user-select: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #121212; position: fixed; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: fixed; top: 15px; left: 15px; color: rgba(255,255,255,0.2); font-family: sans-serif; pointer-events: none; font-size: 10px; }
    </style>
</head>
<body>
    <div id="ui">CONECTANDO...</div>
    <canvas id="canvas"></canvas>

    <script>
        const API_KEY = '7B90kg.w4Ggew:jqrsjcLD2iXsUmHZDEXKLEmCiZ3_gu4auqYwJHBW6kk';
        let miNombre = localStorage.getItem('dibujo_nombre') || prompt("¿Alex o Lia?");
        if(miNombre) localStorage.setItem('dibujo_nombre', miNombre);

        const ably = new Ably.Realtime({ key: API_KEY, clientId: miNombre });
        const channel = ably.channels.get('pizarra-secreta');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { desynchronized: true }); // Latencia ultra baja

        let drawing = false;
        let lastX = 0, lastY = 0;
        let bufferTrazos = []; // Aquí guardaremos los puntos antes de enviarlos
        const miColor = (miNombre.toLowerCase() === 'alex') ? '#ff0066' : '#00ffcc';

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 4;
        }
        window.addEventListener('resize', resize);
        resize();

        // Recibir ráfagas de Lia/Alex
        channel.subscribe('trazo', (msg) => {
            if (msg.clientId !== miNombre) {
                const color = (msg.clientId.toLowerCase() === 'alex') ? '#ff0066' : '#00ffcc';
                msg.data.forEach(t => draw(t.x1, t.y1, t.x2, t.y2, color));
            }
        });

        function draw(x1, y1, x2, y2, color) {
            ctx.strokeStyle = color;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        // ENVIAR PAQUETES CADA 50ms (Elimina el lag rítmico)
        setInterval(() => {
            if (bufferTrazos.length > 0) {
                channel.publish('trazo', bufferTrazos);
                bufferTrazos = [];
            }
        }, 50);

        function mover(e) {
            if (!drawing) return;
            if (e.cancelable) e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            const x = t.clientX;
            const y = t.clientY;

            draw(lastX, lastY, x, y, miColor);
            bufferTrazos.push({ x1: lastX, y1: lastY, x2: x, y2: y });

            lastX = x;
            lastY = y;
        }

        function empezar(e) {
            drawing = true;
            const t = e.touches ? e.touches[0] : e;
            lastX = t.clientX;
            lastY = t.clientY;
        }

        canvas.addEventListener('mousedown', empezar);
        canvas.addEventListener('touchstart', empezar, { passive: false });
        window.addEventListener('mousemove', mover);
        window.addEventListener('touchmove', mover, { passive: false });
        window.addEventListener('mouseup', () => drawing = false);
        window.addEventListener('touchend', () => drawing = false);

        ably.connection.on('connected', () => document.getElementById('ui').innerText = "⚡ " + miNombre.toUpperCase());
    </script>
</body>
</html>
