<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Espacio Alex & Lia</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { 
            touch-action: none !important; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #0b0b0b; 
            position: fixed; 
            /* FUENTE CUADRADA / MONOSPACE */
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui { 
            position: fixed; 
            top: 25px; 
            left: 25px; 
            color: rgba(255,255,255,0.25); 
            font-size: 13px; /* Un pelín más grande para que se note la fuente */
            font-weight: bold;
            letter-spacing: 1px;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #status-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px; /* Cuadradito también */
            background: #ff0066;
            box-shadow: 0 0 12px rgba(255,0,102,0.6);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="status-dot"></div>
        <span id="status-text">CONNECTING...</span>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const API_KEY = '7B90kg.w4Ggew:jqrsjcLD2iXsUmHZDEXKLEmCiZ3_gu4auqYwJHBW6kk';
        
        let miNombre = localStorage.getItem('dibujo_nombre') || prompt("¿ALEX O LIA?");
        if(miNombre) localStorage.setItem('dibujo_nombre', miNombre);

        const ably = new Ably.Realtime({ key: API_KEY, clientId: miNombre });
        const channel = ably.channels.get('pizarra-secreta');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { desynchronized: true });

        let drawing = false;
        let lastX = 0, lastY = 0;
        let bufferTrazos = [];
        
        const colorAlex = '#ff0066';
        const colorLia = '#00ffcc';
        const miColor = (miNombre && miNombre.toLowerCase() === 'alex') ? colorAlex : colorLia;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 3.5;
        }
        window.addEventListener('resize', resize);
        resize();

        channel.subscribe('trazo', (msg) => {
            if (msg.clientId !== miNombre) {
                const colorRecibido = (msg.clientId.toLowerCase() === 'alex') ? colorAlex : colorLia;
                msg.data.forEach(t => {
                    draw(t.px * canvas.width, t.py * canvas.height, t.x * canvas.width, t.y * canvas.height, colorRecibido);
                });
            }
        });

        function draw(x1, y1, x2, y2, color) {
            ctx.strokeStyle = color;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        setInterval(() => {
            if (bufferTrazos.length > 0) {
                channel.publish('trazo', bufferTrazos);
                bufferTrazos = [];
            }
        }, 50);

        function mover(e) {
            if (!drawing) return;
            if (e.cancelable) e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            const x = t.clientX;
            const y = t.clientY;

            draw(lastX, lastY, x, y, miColor);
            bufferTrazos.push({ 
                px: lastX / canvas.width, py: lastY / canvas.height, 
                x: x / canvas.width, y: y / canvas.height 
            });
            [lastX, lastY] = [x, y];
        }

        function empezar(e) {
            drawing = true;
            const t = e.touches ? e.touches[0] : e;
            [lastX, lastY] = [t.clientX, t.clientY];
        }

        canvas.addEventListener('mousedown', empezar);
        canvas.addEventListener('touchstart', empezar, { passive: false });
        window.addEventListener('mousemove', mover);
        window.addEventListener('touchmove', mover, { passive: false });
        window.addEventListener('mouseup', () => drawing = false);
        window.addEventListener('touchend', () => drawing = false);

        ably.connection.on('connected', () => {
            document.getElementById('status-text').innerText = miNombre.toUpperCase();
            document.getElementById('status-dot').style.background = miColor;
            document.getElementById('status-dot').style.boxShadow = `0 0 12px ${miColor}`;
        });
    </script>
</body>
</html>
