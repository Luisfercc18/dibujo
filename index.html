<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nuestro Espacio 🎨</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        #ui { position: fixed; top: 10px; left: 10px; color: rgba(255,255,255,0.5); pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Conectando...</div>
    <canvas id="canvas"></canvas>

    <script>
        // USA TU API KEY QUE YA TIENES
        const API_KEY = '7B90kg.w4Ggew:jqrsjcLD2iXsUmHZDEXKLEmCiZ3_gu4auqYwJHBW6kk'; 
        
        // AQUÍ ESTÁ EL TRUCO: Diferenciamos por dispositivo
        const esCelular = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const miColor = esCelular ? '#00ffcc' : '#ff0066'; // Celular Verde, PC Rosa
        const suColor = esCelular ? '#ff0066' : '#00ffcc';

        const ably = new Ably.Realtime(API_KEY);
        const channel = ably.channels.get('pizarra-secreta');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let drawing = false;
        let lastX = 0, lastY = 0;

        // Escuchar lo que llega
        channel.subscribe('trazo', (msg) => {
            if (msg.clientId !== ably.auth.clientId) {
                dibujar(msg.data.x, msg.data.y, msg.data.px, msg.data.py, suColor);
            }
        });

        function dibujar(x, y, px, py, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 4; // Un poquito más grueso para que se vea mejor
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function mouseMove(e) {
            if (!drawing) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (x && y) {
                dibujar(x, y, lastX, lastY, miColor);
                channel.publish('trazo', { x, y, px: lastX, py: lastY });
                [lastX, lastY] = [x, y];
            }
        }

        canvas.addEventListener('mousedown', (e) => { drawing = true; [lastX, lastY] = [e.clientX, e.clientY]; });
        canvas.addEventListener('touchstart', (e) => { drawing = true; [lastX, lastY] = [e.touches[0].clientX, e.touches[0].clientY]; });
        window.addEventListener('mousemove', mouseMove);
        window.addEventListener('touchmove', mouseMove, { passive: false });
        window.addEventListener('mouseup', () => drawing = false);
        window.addEventListener('touchend', () => drawing = false);

        ably.connection.on('connected', () => ui.innerText = "⚡ Conectado con el servidor");
    </script>
</body>
</html>
